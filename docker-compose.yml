services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma
      POSTGRES_DB: vocab_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prisma -d vocab_bot"]
      interval: 5s
      timeout: 5s
      retries: 20

  bot:
    build:
      context: .
    # Load secrets from `.env` next to this file (paths are relative to the compose file).
    # Do NOT pass TG_BOT_TOKEN via `${TG_BOT_TOKEN}` here: if substitution is empty (wrong cwd / no shell env),
    # it overrides the value from env_file with an empty string.
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

